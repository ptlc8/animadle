<!DOCTYPE html>
<html data-app="{animaux: []}">

    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Animadle</title>
        <link rel="stylesheet" href="style.css" />
        <script src="https://cdn.jsdelivr.net/gh/ptlc8/anchovy@0.3.3/src/anchovy.js"></script>
        <script src="script.js"></script>
        <script async>
            (async () => {
                app.data.animaux = await Animaux.getAll();
            })();
            function getFilteredProjects() {
                return app.data.projects
                    .filter(project => project.name.match(new RegExp(app.data.search, 'i')))
                    .sort((a, b) => a[app.data.sort] > b[app.data.sort] ? 1 : -1);
            }
        </script>
    </head>

    <body>
        <table>
            <thead>
                <tr>
                    <th>Nom</th>
                    <th>Région</th>
                    <th>Alimentation</th>
                    <th>Biologie</th>
                    <th>Habitat</th>
                    <th>Mode de vie</th>
                    <th>Domestication</th>
                </tr>
            </thead>
            <tbody data-foreach-animal="Object.values(animaux).slice(0, 30)" data-update="animaux">
                <tr>
                    <td data-bind="animal.name"></td>
                    <td data-bind="animal.region?.join(', ')"></td>
                    <td data-bind="animal.alimentation?.join(', ')"></td>
                    <td data-bind="animal.biologies?.join(', ')"></td>
                    <td data-foreach-habitat="animal.habitats ?? []">
                        <span class="icon" data-style-background-image="`url(assets/${habitat}.jpg)`" data-bind="habitat"></span>
                    </td>
                    <td data-foreach-mode="animal.modedevie ?? []">
                        <span class="icon" data-style-background-image="`url(assets/${mode}.jpg)`" data-bind="mode"></span>
                    </td>
                    <td data-bind="animal.domestication?.join(', ')"></td>
                </tr>
            </tbody>
        </table>
    </body>

</html>
